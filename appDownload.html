<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Play Albastini</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d0e12;
            color: #ffffff;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff4500, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.2rem;
            color: #a0a5b5;
            max-width: 400px;
            line-height: 1.6;
        }
        .loader {
            border: 4px solid #1a1c23;
            border-top: 4px solid #ff5e00;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #ff5e00, #ff8c00);
            color: white;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(255, 94, 0, 0.4);
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 94, 0, 0.6);
        }
    </style>
</head>
<body>
    <h1>Albastini</h1>
    <p>Opening the game and applying your referral code...</p>
    <div class="loader"></div>
    <p style="font-size: 0.9rem; color: #606575;">If the game doesn't open automatically, click the button below to download.</p>
    <a id="fallback-button" class="btn" href="#">Download Game</a>

    <script>
        // Extract referral code from URL parameters (?referral=XXXXXX or ?code=XXXXXX)
        const urlParams = new URLSearchParams(window.location.search);
        const referralCode = urlParams.get('referral') || urlParams.get('code') || '';

        // Deep link custom scheme URL registered in AndroidManifest / Info.plist
        const appSchemeUrl = `unitydl://referalLink?code=${referralCode}`;
        
        // Define Store URLs
        const playStoreUrl = 'https://play.google.com/store/apps/details?id=com.albastini'; // Replace with your actual Android package name
        const appStoreUrl = 'https://apps.apple.com/app/id6503353510'; // Albastini iOS App ID

        // Detect OS to set the fallback store URL
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        let storeUrl = playStoreUrl;
        
        if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
            storeUrl = appStoreUrl;
        }

        // Apply URL to fallback download button
        document.getElementById('fallback-button').href = storeUrl;

        // Immediately try opening the app via custom deep link scheme
        window.location.href = appSchemeUrl;

        // Fallback redirection:
        // If the app opens, the browser is backgrounded, which pauses/delays JS execution.
        // If the app is NOT installed, this timer completes quickly and redirects them to the store.
        const start = Date.now();
        setTimeout(function() {
            if (Date.now() - start < 1500) {
                window.location.href = storeUrl;
            }
        }, 1000);
    </script>
</body>
</html>
